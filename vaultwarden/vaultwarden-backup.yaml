apiVersion: core.pointblank.com/v1alpha1
kind: Backup
metadata:
  name: vaultwarden-backup
  namespace: vaultwarden
spec:
  schedule: "0 2 * * *"
  targetApp: "vaultwarden"
  
  # The PVC attached to your live Vaultwarden pod
  sourcePVCName: "vaultwarden-data"
  
  storageBackend: "garage-s3"
  bucketName: "vaultwarden-backups"
  
  # The secret generated by your garage-init job
  credentialsSecret: "garage-s3-credentials"
