apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Aneesh-Hegde/pb-backup-crd-test.git'
    targetRevision: main
    path: vaultwarden

  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
