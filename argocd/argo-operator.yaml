apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pb-backup-operator
  namespace: argocd
spec:
  project: default
  source:
    # Update this line to point to the -test repo
    repoURL: https://github.com/Aneesh-Hegde/pb-backup-crd-test.git
    targetRevision: main
    path: crd/backup-operator/config/default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: pb-backup-crd-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
