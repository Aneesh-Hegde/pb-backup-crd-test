apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pb-backup-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Aneesh-Hegde/pb-backup-crd.git'
    targetRevision: main
    # This path contains the Kustomize output generated by Kubebuilder
    path: config/default 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: pb-backup-crd-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CRDs are large and require ServerSideApply to avoid annotation size limits
      - CreateNamespace=true
      - ServerSideApply=true
