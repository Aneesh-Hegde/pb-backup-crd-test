apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  garage.toml: |
    metadata_dir = "/tmp/meta"
    data_dir = "/tmp/data"
    db_engine = "sqlite"

    replication_factor = 1

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "garage.garage.svc.cluster.local:3901"
    rpc_secret = "0abeb5f41333fcc957de20dcdaeb2b809fd5fb7cb60ced25c0942d8e3f56bd6d"

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ""

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.garage.localhost"
    index = "index.html"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = "jOd8jyxLSbrgjwN7M59paKIvNkeKfh6XVpJomvhQncqd53yESkoXw9vXI15jPRJk"
