#Job to assign layout to the garage instance
apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage-init-sa
  namespace: garage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garage-init-role
  namespace: garage
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garage-init-rolebinding
  namespace: garage
subjects:
  - kind: ServiceAccount
    name: garage-init-sa
    namespace: garage
roleRef:
  kind: Role
  name: garage-init-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-init
  namespace: garage
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      serviceAccountName: garage-init-sa
      containers:
        - name: init
          image: bitnami/kubectl:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              echo "Waiting for all 3 Garage pods to be ready..."
              for i in 0 1 2; do
                kubectl wait --for=condition=ready pod/garage-$i -n garage --timeout=300s
              done

              # Get hex IDs only
              NODE_0=$(kubectl exec -n garage garage-0 -- /garage node id -q | cut -d@ -f1)
              NODE_1=$(kubectl exec -n garage garage-1 -- /garage node id -q | cut -d@ -f1)
              NODE_2=$(kubectl exec -n garage garage-2 -- /garage node id -q | cut -d@ -f1)

              # Get real IPs directly from Kubernetes
              IP_0=$(kubectl get pod garage-0 -n garage -o jsonpath='{.status.podIP}')
              IP_1=$(kubectl get pod garage-1 -n garage -o jsonpath='{.status.podIP}')
              IP_2=$(kubectl get pod garage-2 -n garage -o jsonpath='{.status.podIP}')

              echo "garage-0: $NODE_0 @ $IP_0"
              echo "garage-1: $NODE_1 @ $IP_1"
              echo "garage-2: $NODE_2 @ $IP_2"

              echo "Connecting garage-1 to garage-0..."
              kubectl exec -n garage garage-1 -- /garage node connect "${NODE_0}@${IP_0}:3901"

              echo "Connecting garage-2 to garage-0..."
              kubectl exec -n garage garage-2 -- /garage node connect "${NODE_0}@${IP_0}:3901"

              sleep 5

              echo "=== Cluster status after peering ==="
              kubectl exec -n garage garage-0 -- /garage status

              echo "Checking layout..."
              LAYOUT_OUTPUT=$(kubectl exec -n garage garage-0 -- /garage layout show)

              if echo "$LAYOUT_OUTPUT" | grep -q "NO ROLE ASSIGNED"; then
                echo "Assigning layout roles based on physical topology..."

                # Get the physical K8s Node names where the pods are running
                K8S_NODE_0=$(kubectl get pod garage-0 -n garage -o jsonpath='{.spec.nodeName}')
                K8S_NODE_1=$(kubectl get pod garage-1 -n garage -o jsonpath='{.spec.nodeName}')
                K8S_NODE_2=$(kubectl get pod garage-2 -n garage -o jsonpath='{.spec.nodeName}')

                # Extract actual availability zone labels, with a fallback if labels are missing
                ZONE_0=$(kubectl get node "$K8S_NODE_0" -o jsonpath='{.metadata.labels.topology\.kubernetes\.io/zone}')
                ZONE_0=${ZONE_0:-z1} 

                ZONE_1=$(kubectl get node "$K8S_NODE_1" -o jsonpath='{.metadata.labels.topology\.kubernetes\.io/zone}')
                ZONE_1=${ZONE_1:-z2}

                ZONE_2=$(kubectl get node "$K8S_NODE_2" -o jsonpath='{.metadata.labels.topology\.kubernetes\.io/zone}')
                ZONE_2=${ZONE_2:-z3}

                echo "Detected Zones -> Node 0: $ZONE_0, Node 1: $ZONE_1, Node 2: $ZONE_2"

                # Feed the real zones into Garage
                kubectl exec -n garage garage-0 -- \
                  /garage layout assign "$NODE_0" -z "$ZONE_0" -c 1G -t garage-0
                kubectl exec -n garage garage-0 -- \
                  /garage layout assign "$NODE_1" -z "$ZONE_1" -c 1G -t garage-1
                kubectl exec -n garage garage-0 -- \
                  /garage layout assign "$NODE_2" -z "$ZONE_2" -c 1G -t garage-2

                # Dynamically look for the staged version to apply
                STAGED_VERSION=$(kubectl exec -n garage garage-0 -- /garage layout show | grep -i "staged for configuration" | awk '{print $NF}' | tr -d '[:punct:]' || echo 1)
                
                echo "Applying layout version: ${STAGED_VERSION}"
                kubectl exec -n garage garage-0 -- /garage layout apply --version "${STAGED_VERSION}"

                echo "Waiting for ring sync..."
                sleep 5
              else
                echo "Layout already initialized, skipping."
              fi

              echo "=== Final cluster status ==="
              kubectl exec -n garage garage-0 -- /garage status
      restartPolicy: OnFailure
