apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage-init-sa
  namespace: garage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: garage-init-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: garage-init-rolebinding
subjects:
  - kind: ServiceAccount
    name: garage-init-sa
    namespace: garage
roleRef:
  kind: ClusterRole
  name: garage-init-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-init
  namespace: garage
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      serviceAccountName: garage-init-sa
      containers:
        - name: init
          image: bitnami/kubectl:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Waiting for garage-0 pod to be ready..."
              kubectl wait --for=condition=ready pod/garage-0 -n garage --timeout=300s

              echo "Checking layout status..."
              LAYOUT_OUTPUT=$(kubectl exec -n garage garage-0 -- /garage layout show)

              if echo "$LAYOUT_OUTPUT" | grep -q "Current cluster layout version: 0"; then
                echo "Layout not initialized, proceeding with setup..."
                
                NODE_ID=$(kubectl exec -n garage garage-0 -- /garage status | grep -v "ROLE" | grep -v "====" | grep -v "^ID" | awk 'NF && !/^[[:space:]]*$/ {print $1; exit}')
                
                echo "Assigning layout to node $NODE_ID"
                kubectl exec -n garage garage-0 -- /garage layout assign "$NODE_ID" -z dc1 -c 1G -t garage-0
                
                echo "Applying layout..."
                kubectl exec -n garage garage-0 -- /garage layout apply --version 1
                
                echo "Garage layout applied successfully!"
              else
                echo "Layout already initialized, skipping."
              fi

              # --- AUTOMATED S3 BUCKET & KEY PROVISIONING ---
              echo "Checking if vaultwarden-backups bucket exists..."
              kubectl exec -n garage garage-0 -- /garage bucket info vaultwarden-backups || kubectl exec -n garage garage-0 -- /garage bucket create vaultwarden-backups

              echo "Checking if vaultwarden-key exists..."
              if ! kubectl exec -n garage garage-0 -- /garage key list | grep -q vaultwarden-key; then
                echo "Generating new S3 keys..."
                KEY_OUTPUT=$(kubectl exec -n garage garage-0 -- /garage key create vaultwarden-key)
                
                ACCESS_KEY=$(echo "$KEY_OUTPUT" | grep "Key ID:" | awk '{print $3}')
                SECRET_KEY=$(echo "$KEY_OUTPUT" | grep "Secret key:" | awk '{print $3}')

                echo "Granting bucket permissions to the key..."
                kubectl exec -n garage garage-0 -- /garage bucket allow vaultwarden-backups --read --write --owner --key vaultwarden-key

                echo "Pushing S3 credentials to a Kubernetes Secret in the vaultwarden namespace..."
                kubectl create secret generic garage-s3-credentials -n vaultwarden \
                  --from-literal=AWS_ACCESS_KEY_ID=$ACCESS_KEY \
                  --from-literal=AWS_SECRET_ACCESS_KEY=$SECRET_KEY \
                  --dry-run=client -o yaml | kubectl apply -f -
                
                echo "S3 automated provisioning complete!"
              else
                echo "S3 key already exists. Skipping provisioning."
              fi
      restartPolicy: OnFailure
