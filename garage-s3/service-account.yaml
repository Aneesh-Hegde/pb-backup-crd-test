apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage-init-sa
  namespace: garage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: garage-init-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: garage-init-rolebinding
subjects:
  - kind: ServiceAccount
    name: garage-init-sa
    namespace: garage
roleRef:
  kind: ClusterRole
  name: garage-init-role
  apiGroup: rbac.authorization.k8s.io
